name: CI · Backend

on:
  pull_request:
    paths:
      - 'src/backend/**'
      - '.github/workflows/ci-backend.yml'

concurrency:
  group: ci-backend-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

defaults:
  run:
    working-directory: src/backend

jobs:
  build:
    name: Restore, build & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Portfolio.slnx

      - name: Build
        run: dotnet build Portfolio.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test Portfolio.slnx --configuration Release --no-build --verbosity normal

  docker:
    name: Validate Docker build
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint Dockerfile config
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: src/backend
          severity: CRITICAL,HIGH
          exit-code: '1'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: src/backend
          file: src/backend/Dockerfile
          push: false
          load: true
          tags: portfolio-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image (SARIF for code scanning)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: portfolio-backend:ci
          format: sarif
          output: trivy-results.sarif
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Upload scan results
        if: always() && hashFiles('trivy-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-image-backend

      - name: Fail on CRITICAL/HIGH vulnerabilities
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: portfolio-backend:ci
          format: table
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH
          exit-code: '1'
