{{- if and .Values.backend.enabled .Values.backend.externalSecret.enabled -}}
{{- $es := .Values.backend.externalSecret -}}
{{- if not $es.secretStoreRef.name }}
{{- fail "backend.externalSecret.secretStoreRef.name must be set when backend.externalSecret.enabled is true (or set backend.externalSecret.enabled=false and provide backend.existingSecret)" }}
{{- end }}
apiVersion: {{ $es.apiVersion }}
kind: ExternalSecret
metadata:
  name: {{ include "portfolio.backend.fullname" . }}
  labels:
    {{- include "portfolio.backend.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ $es.refreshInterval }}
  secretStoreRef:
    name: {{ $es.secretStoreRef.name }}
    kind: {{ $es.secretStoreRef.kind }}
  target:
    name: {{ include "portfolio.backend.secretName" . }}
    creationPolicy: {{ $es.target.creationPolicy }}
    {{- with $es.target.template }}
    template:
      {{- toYaml . | nindent 6 }}
    {{- end }}
  {{- with $es.data }}
  data:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with $es.dataFrom }}
  dataFrom:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
