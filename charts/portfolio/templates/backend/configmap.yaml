{{- if .Values.backend.enabled -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "portfolio.backend.configMapName" . }}
  labels:
    {{- include "portfolio.backend.labels" . | nindent 4 }}
data:
  {{- range $key, $value := .Values.backend.config }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- range $key, $value := .Values.backend.extraConfig }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- $cacheKey := "ConnectionStrings__cache" }}
  {{- if and .Values.cache.enabled (not (hasKey .Values.backend.config $cacheKey)) (not (hasKey .Values.backend.extraConfig $cacheKey)) }}
  # Derived from the provisioned Dragonfly cache (Redis-protocol, no auth).
  {{ $cacheKey }}: {{ printf "%s:6379" (include "portfolio.cache.name" .) | quote }}
  {{- end }}
{{- end }}
