{{- if and .Values.backend.enabled .Values.backend.ciliumNetworkPolicy.enabled -}}
{{- $cnp := .Values.backend.ciliumNetworkPolicy -}}
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "portfolio.backend.fullname" . }}
  labels:
    {{- include "portfolio.backend.labels" . | nindent 4 }}
spec:
  endpointSelector:
    matchLabels:
      {{- include "portfolio.backend.selectorLabels" . | nindent 6 }}
  # Default-deny per direction. Only the rules below are permitted.
  enableDefaultDeny:
    ingress: {{ $cnp.defaultDeny.ingress }}
    egress: {{ $cnp.defaultDeny.egress }}
  ingress:
    {{- if $cnp.ingress.fromGateway.enabled }}
    # Inbound HTTP from the Gateway data-plane Pods.
    - fromEndpoints:
        - matchLabels:
            {{- toYaml $cnp.ingress.fromGateway.endpointSelector.matchLabels | nindent 12 }}
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    {{- end }}
    {{- if $cnp.ingress.fromFrontend.enabled }}
    # Inbound HTTP from the frontend Pods (server-side API calls).
    - fromEndpoints:
        - matchLabels:
            {{- include "portfolio.frontend.selectorLabels" . | nindent 12 }}
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    {{- end }}
    {{- if $cnp.ingress.allowHostProbes }}
    # Liveness/readiness probes from the node (kubelet runs on the host).
    - fromEntities:
        - host
        - remote-node
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    {{- end }}
    {{- with $cnp.ingress.extra }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- if or $cnp.egress.allowDNS $cnp.egress.toWorldPorts $cnp.egress.toCache.enabled $cnp.egress.extra }}
  egress:
    {{- if $cnp.egress.allowDNS }}
    # DNS resolution to kube-dns.
    - toEndpoints:
        - matchLabels:
            {{- toYaml $cnp.egress.dnsEndpointSelector.matchLabels | nindent 12 }}
      toPorts:
        - ports:
            - port: "53"
              protocol: ANY
          rules:
            dns:
              - matchPattern: "*"
    {{- end }}
    {{- with $cnp.egress.toWorldPorts }}
    # Outbound to external services (Hardcover HTTPS API, SMTP relay).
    - toEntities:
        - world
      toPorts:
        - ports:
            {{- toYaml . | nindent 12 }}
    {{- end }}
    {{- if $cnp.egress.toCache.enabled }}
    # In-cluster Dragonfly cache. Defaults to the provisioned instance's Pods
    # (the operator labels them `app: <cache name>`).
    - toEndpoints:
        - matchLabels:
            {{- if $cnp.egress.toCache.endpointSelector }}
            {{- toYaml $cnp.egress.toCache.endpointSelector | nindent 12 }}
            {{- else }}
            app: {{ include "portfolio.cache.name" . }}
            {{- end }}
      toPorts:
        - ports:
            - port: {{ $cnp.egress.toCache.port | quote }}
              protocol: TCP
    {{- end }}
    {{- with $cnp.egress.extra }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- end }}
{{- end }}
