apiVersion: v1
kind: Pod
metadata:
  name: {{ include "portfolio.fullname" . }}-test-connection
  labels:
    {{- include "portfolio.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: test
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  securityContext:
    runAsNonRoot: true
    runAsUser: 65534
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: wget
      image: busybox:1.37
      command: ['wget']
      args: ['--spider', '-S', 'http://{{ include "portfolio.fullname" . }}:{{ .Values.service.port }}/']
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL
