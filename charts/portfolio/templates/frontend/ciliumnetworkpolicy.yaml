{{- if and .Values.frontend.enabled .Values.frontend.ciliumNetworkPolicy.enabled -}}
{{- $cnp := .Values.frontend.ciliumNetworkPolicy -}}
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "portfolio.frontend.fullname" . }}
  labels:
    {{- include "portfolio.frontend.labels" . | nindent 4 }}
spec:
  endpointSelector:
    matchLabels:
      {{- include "portfolio.frontend.selectorLabels" . | nindent 6 }}
  # Default-deny per direction. Egress denied + no egress rules below = no
  # outbound connections; ingress denied except the rules that follow.
  enableDefaultDeny:
    ingress: {{ $cnp.defaultDeny.ingress }}
    egress: {{ $cnp.defaultDeny.egress }}
  ingress:
    {{- if $cnp.ingress.fromGateway.enabled }}
    # Inbound HTTP from the Gateway data-plane Pods.
    - fromEndpoints:
        - matchLabels:
            {{- toYaml $cnp.ingress.fromGateway.endpointSelector.matchLabels | nindent 12 }}
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    {{- end }}
    {{- if $cnp.ingress.allowHostProbes }}
    # Liveness/readiness probes from the node (kubelet runs on the host).
    - fromEntities:
        - host
        - remote-node
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    {{- end }}
    {{- with $cnp.ingress.extra }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- if or $cnp.egress.allowDNS $cnp.egress.toBackend.enabled $cnp.egress.extra }}
  egress:
    {{- if $cnp.egress.allowDNS }}
    # DNS resolution to kube-dns.
    - toEndpoints:
        - matchLabels:
            {{- toYaml $cnp.egress.dnsEndpointSelector.matchLabels | nindent 12 }}
      toPorts:
        - ports:
            - port: "53"
              protocol: ANY
          rules:
            dns:
              - matchPattern: "*"
    {{- end }}
    {{- if and $cnp.egress.toBackend.enabled .Values.backend.enabled }}
    # Reverse-proxy /api/* to the in-cluster backend Pods. Requires allowDNS so
    # nginx can resolve the backend Service name at request time (see nginx.conf).
    - toEndpoints:
        - matchLabels:
            {{- include "portfolio.backend.selectorLabels" . | nindent 12 }}
      toPorts:
        - ports:
            - port: {{ $cnp.egress.toBackend.port | quote }}
              protocol: TCP
    {{- end }}
    {{- with $cnp.egress.extra }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- end }}
{{- end }}
