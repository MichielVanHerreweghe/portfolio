<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<!-- Utility/print page: keep it out of the index so it doesn't compete with
     the real pages as a thin, near-duplicate result. Still crawlable/linkable. -->
<meta name="robots" content="noindex, follow" />
<title>Michiel Van Herreweghe — Résumé</title>
<!-- Self-hosted fonts (see frontend/scripts/fetch-fonts.mjs) — no Google CDN. -->
<link rel="preload" href="/fonts/space-grotesk-400-latin.woff2" as="font" type="font/woff2" crossorigin />
<link rel="stylesheet" href="/fonts/fonts.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --volt: #FFD000; --ink: #15140F; --muted: #5a594f; --faint: #8a887d; --line: #e4e2d8; }
  body { font-family: 'Space Grotesk', sans-serif; background: #d8d7d0; color: var(--ink); -webkit-font-smoothing: antialiased; padding: 36px 16px; }
  .mono { font-family: 'JetBrains Mono', monospace; }

  .toolbar { max-width: 820px; margin: 0 auto 22px; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 14px; }
  .toolbar a, .toolbar button { font-family: inherit; font-weight: 600; font-size: 15px; border: none; border-radius: 3px; padding: 12px 20px; cursor: pointer; display: inline-flex; align-items: center; gap: 9px; text-decoration: none; }
  .btn-y { background: var(--volt); color: #0B0B0C; }
  .btn-g { background: #fff; color: var(--ink); border: 1px solid #c9c7bd; }
  .toolbar .hint { font-size: 13px; color: #6b6a60; flex: 1 1 120px; min-width: 0; }
  .lang-switch { display: inline-flex; flex: 0 0 auto; gap: 2px; background: #fff; border: 1px solid #c9c7bd; border-radius: 3px; overflow: hidden; }
  .lang-switch button { font-family: 'JetBrains Mono', monospace; font-weight: 500; font-size: 12.5px; letter-spacing: 0.06em; padding: 10px 12px; border-radius: 0; background: #fff; color: var(--muted); }
  .lang-switch button[aria-current="true"] { background: var(--volt); color: #0B0B0C; }

  .sheet { max-width: 820px; margin: 0 auto; background: #fff; box-shadow: 0 30px 70px -30px rgba(0,0,0,0.4); padding: 56px 60px; }

  header.r-head { display: grid; grid-template-columns: 1fr auto; gap: 20px; align-items: end; border-bottom: 3px solid var(--ink); padding-bottom: 24px; }
  .r-name { font-size: 46px; font-weight: 700; letter-spacing: -0.03em; line-height: 1.06; }
  .r-name .hl { background: var(--volt); padding: 0 6px; -webkit-box-decoration-break: clone; box-decoration-break: clone; }
  .r-role { font-size: 16px; color: var(--muted); margin-top: 12px; font-weight: 500; }
  .r-contact { text-align: right; font-size: 13px; line-height: 1.9; color: var(--muted); }
  .r-contact a { color: var(--ink); text-decoration: none; }

  .r-grid { display: grid; grid-template-columns: 1fr; gap: 0; }
  section.block { padding-top: 28px; }
  .block h2 { font-size: 13px; letter-spacing: 0.18em; font-family: 'JetBrains Mono', monospace; color: var(--ink); text-transform: uppercase; margin-bottom: 16px; display: flex; align-items: center; gap: 12px; }
  .block h2::before { content: ""; width: 22px; height: 2px; background: var(--volt); }

  .summary { font-size: 15.5px; line-height: 1.6; color: var(--muted); max-width: 64ch; }

  .xp { display: grid; grid-template-columns: 140px 1fr; gap: 24px; padding: 14px 0; border-top: 1px solid var(--line); }
  .xp:first-of-type { border-top: none; }
  .xp .when { font-family: 'JetBrains Mono', monospace; font-size: 12.5px; color: var(--faint); padding-top: 3px; }
  .xp h3 { font-size: 18px; }
  .xp .org { color: #b08600; font-weight: 600; font-size: 14px; margin-top: 3px; }
  .xp p { color: var(--muted); font-size: 14px; line-height: 1.55; margin-top: 8px; }

  .skills { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px 36px; }
  .skill-row { display: flex; justify-content: space-between; gap: 16px; padding: 7px 0; border-bottom: 1px solid var(--line); font-size: 14px; }
  .skill-row .g { font-weight: 600; }
  .skill-row .v { color: var(--muted); text-align: right; }

  .edu { display: flex; justify-content: space-between; padding: 9px 0; border-top: 1px solid var(--line); font-size: 14.5px; }
  .edu:first-of-type { border-top: none; }
  .edu .when { font-family: 'JetBrains Mono', monospace; font-size: 12.5px; color: var(--faint); }

  @media print {
    @page { margin: 14mm; size: A4; }
    body { background: #fff; padding: 0; }
    .toolbar { display: none; }
    .sheet { box-shadow: none; max-width: 100%; padding: 0; }
    a { color: var(--ink) !important; }
  }
  @media (max-width: 620px) {
    .sheet { padding: 34px 26px; }
    header.r-head { grid-template-columns: 1fr; }
    .r-contact { text-align: left; }
    .xp, .skills { grid-template-columns: 1fr; gap: 6px; }
  }
</style>
</head>
<body>
  <div class="toolbar">
    <a class="btn-g" id="r-back" href="/">← Back to site</a>
    <span class="hint" id="r-tip"></span>
    <div class="lang-switch" id="r-langs"></div>
    <button class="btn-y" id="r-download"></button>
  </div>

  <div class="sheet">
    <header class="r-head">
      <div>
        <div class="r-name">Michiel <span class="hl">Van Herreweghe</span></div>
        <div class="r-role" id="r-role"></div>
      </div>
      <div class="r-contact" id="r-contact"></div>
    </header>
    <div class="r-grid" id="r-grid"></div>
  </div>

  <script src="/Resume.js"></script>
</body>
</html>
