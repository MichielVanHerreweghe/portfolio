# Hardened static-site server for the unprivileged nginx image.
# Listens on 8080 (non-root cannot bind to 80).
server {
    listen       8080;
    listen       [::]:8080;
    server_name  _;

    root  /usr/share/nginx/html;
    index index.html;

    # --- Hide implementation details ---
    server_tokens off;

    # --- Security headers ---
    # NB: nginx's add_header inheritance is brittle — if a child `location`
    # introduces *any* add_header of its own, it drops every inherited one
    # (even `always`). Whenever you add a header here, you must also re-add it
    # in any inner location block that overrides Cache-Control (see /index.html
    # below). The named map approach `map $sent_http_x_security_headers_set …`
    # would be cleaner, but for a static-server config the explicit duplication
    # is easier to read.
    add_header X-Content-Type-Options    "nosniff"                                  always;
    add_header X-Frame-Options           "DENY"                                     always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"          always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains"      always;
    # Tighten/extend the CSP to match the assets your site actually loads.
    # img-src allows https: so book covers served from external hosts (Hardcover's
    # CDN, Amazon, Google Books, …) load. connect-src 'self' covers the same-origin
    # /api calls; widen it if you point PUBLIC_API_BASE_URL at a cross-origin API.
    #
    # script-src pins sha256 hashes instead of 'unsafe-inline'. The whole site is
    # a `client:load` React island, so Astro injects two inline bootstrap scripts
    # (the `self.Astro.load` loader and the `<astro-island>` hydration runtime) on
    # every page; Layout.astro adds one more (the pre-paint theme/lang setter).
    # Without these hashes the browser blocks all three and React never hydrates.
    #
    # This file is a template rendered in TWO stages, so the hashes are never
    # hand-maintained:
    #   1. build time — the `postbuild` step (scripts/render-nginx-csp.mjs)
    #      recomputes the inline-script hashes from the freshly built dist/ and
    #      replaces the __CSP_SCRIPT_HASHES__ token below, writing nginx.conf.rendered.
    #      That rendered file is what the Docker image ships, so an
    #      astro/@astrojs/react upgrade that shifts a hash is picked up automatically.
    #   2. container start — the nginx image's envsubst pass fills the ${...}
    #      runtime vars (BACKEND_UPSTREAM, NGINX_LOCAL_RESOLVERS). __CSP_SCRIPT_HASHES__
    #      is deliberately NOT ${...} syntax so envsubst leaves it alone.
    add_header Content-Security-Policy   "default-src 'self'; img-src 'self' data: https:; connect-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self'__CSP_SCRIPT_HASHES__; object-src 'none'; frame-ancestors 'none'; base-uri 'self'" always;

    # --- API reverse proxy: same-origin /api/* -> internal backend Service ---
    # The backend is NOT exposed via the Gateway. The browser calls same-origin
    # /api/* (see src/lib/api.js) and nginx proxies server-side to the in-cluster
    # backend Service. The upstream host:port is injected at container start from
    # the BACKEND_UPSTREAM env var: this file is an nginx envsubst template, so
    # ${BACKEND_UPSTREAM} and ${NGINX_LOCAL_RESOLVERS} are substituted at start
    # (nginx runtime vars like $host are not env vars, so they are left
    # untouched). The Helm chart sets BACKEND_UPSTREAM to the backend Service
    # (<release>-backend:<port>); the image default is portfolio-backend:80.
    # Using a variable + a resolver defers DNS to request time, so nginx still
    # starts (and returns 502 on /api) if the backend is absent or down. The
    # resolver address is taken from the image's local-resolvers entrypoint,
    # which reads /etc/resolv.conf and exports NGINX_LOCAL_RESOLVERS only when
    # NGINX_ENTRYPOINT_LOCAL_RESOLVERS is set (the Dockerfile sets it).
    location /api/ {
        resolver ${NGINX_LOCAL_RESOLVERS} ipv6=off valid=30s;
        set $api_upstream "${BACKEND_UPSTREAM}";
        proxy_pass http://$api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Routing ---
    location / {
        # Serve the file, then the directory, then fall back to 404.
        try_files $uri $uri/ $uri.html =404;
    }

    # --- Caching: long-lived for fingerprinted assets, none for HTML ---
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(?:css|js|woff2?|ttf|otf|eot|svg|png|jpe?g|gif|webp|avif|ico)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    location = /index.html {
        # Any add_header in a location block drops *all* inherited add_header
        # directives — re-declare the security set so the homepage isn't the
        # only route shipping without CSP / HSTS / X-Frame-Options.
        add_header X-Content-Type-Options    "nosniff"                                  always;
        add_header X-Frame-Options           "DENY"                                     always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"          always;
        add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains"      always;
        add_header Content-Security-Policy   "default-src 'self'; img-src 'self' data: https:; connect-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self'__CSP_SCRIPT_HASHES__; object-src 'none'; frame-ancestors 'none'; base-uri 'self'" always;
        # Short cache + must-revalidate lets return visits use a conditional
        # request (304 on the ETag) instead of refetching the full HTML.
        add_header Cache-Control             "public, max-age=300, must-revalidate";
    }

    # Conventional `/sitemap.xml` URL — robots.txt points to the real
    # sitemap-index, but Google/Bing also probe `/sitemap.xml` directly. A
    # 301 here stops the 404 noise in access logs and search-console reports.
    location = /sitemap.xml {
        return 301 /sitemap-index.xml;
    }

    # --- Compression ---
    gzip            on;
    gzip_vary       on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/ttf
        font/otf;

    # --- Don't serve dotfiles (e.g. accidental .env, .git) ---
    location ~ /\. {
        deny all;
    }

    # --- Custom error page falls back to SPA-style index when desired ---
    error_page 404 /404.html;
}
