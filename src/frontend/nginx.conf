# Hardened static-site server for the unprivileged nginx image.
# Listens on 8080 (non-root cannot bind to 80).
server {
    listen       8080;
    listen       [::]:8080;
    server_name  _;

    root  /usr/share/nginx/html;
    index index.html;

    # --- Hide implementation details ---
    server_tokens off;

    # --- Security headers ---
    add_header X-Content-Type-Options    "nosniff"               always;
    add_header X-Frame-Options           "DENY"                  always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
    # Tighten/extend the CSP to match the assets your site actually loads.
    # img-src allows https: so book covers served from external hosts (Hardcover's
    # CDN, Amazon, Google Books, …) load. connect-src 'self' covers the same-origin
    # /api calls; widen it if you point PUBLIC_API_BASE_URL at a cross-origin API.
    add_header Content-Security-Policy   "default-src 'self'; img-src 'self' data: https:; connect-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'" always;

    # --- API reverse proxy: same-origin /api/* -> internal backend Service ---
    # The backend is NOT exposed via the Gateway. The browser calls same-origin
    # /api/* (see src/lib/api.js) and nginx proxies server-side to the in-cluster
    # backend Service. The upstream host:port is injected at container start from
    # the BACKEND_UPSTREAM env var: this file is an nginx envsubst template, and
    # only ${BACKEND_UPSTREAM} is substituted (nginx runtime vars like $host are
    # left untouched). The Helm chart sets BACKEND_UPSTREAM to the backend Service
    # (<release>-backend:<port>); the image default is portfolio-backend:80.
    # Using a variable + the system resolver defers DNS to request time, so nginx
    # still starts (and returns 502 on /api) if the backend is absent or down.
    location /api/ {
        resolver local=on ipv6=off valid=30s;
        set $api_upstream "${BACKEND_UPSTREAM}";
        proxy_pass http://$api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Routing ---
    location / {
        # Serve the file, then the directory, then fall back to 404.
        try_files $uri $uri/ $uri.html =404;
    }

    # --- Caching: long-lived for fingerprinted assets, none for HTML ---
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(?:css|js|woff2?|ttf|otf|eot|svg|png|jpe?g|gif|webp|avif|ico)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # --- Compression ---
    gzip            on;
    gzip_vary       on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/ttf
        font/otf;

    # --- Don't serve dotfiles (e.g. accidental .env, .git) ---
    location ~ /\. {
        deny all;
    }

    # --- Custom error page falls back to SPA-style index when desired ---
    error_page 404 /404.html;
}
