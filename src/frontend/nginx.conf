# Hardened static-site server for the unprivileged nginx image.
# Listens on 8080 (non-root cannot bind to 80).
server {
    listen       8080;
    listen       [::]:8080;
    server_name  _;

    root  /usr/share/nginx/html;
    index index.html;

    # --- Hide implementation details ---
    server_tokens off;

    # --- Security headers ---
    add_header X-Content-Type-Options    "nosniff"               always;
    add_header X-Frame-Options           "DENY"                  always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
    # Tighten/extend the CSP to match the assets your site actually loads.
    add_header Content-Security-Policy   "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'" always;

    # --- Routing ---
    location / {
        # Serve the file, then the directory, then fall back to 404.
        try_files $uri $uri/ $uri.html =404;
    }

    # --- Caching: long-lived for fingerprinted assets, none for HTML ---
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(?:css|js|woff2?|ttf|otf|eot|svg|png|jpe?g|gif|webp|avif|ico)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # --- Compression ---
    gzip            on;
    gzip_vary       on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/ttf
        font/otf;

    # --- Don't serve dotfiles (e.g. accidental .env, .git) ---
    location ~ /\. {
        deny all;
    }

    # --- Custom error page falls back to SPA-style index when desired ---
    error_page 404 /404.html;
}
